<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Vault - Full Marketing Edition</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        :root {
            /* 更舒服的閱讀基準：手機略小、桌機略大 */
            --base-font-size: clamp(16px, 1.1vw + 12px, 18px);
            --base-line-height: 1.7;
        }

        html {
            font-size: var(--base-font-size);
            -webkit-text-size-adjust: 100%;
            text-rendering: optimizeLegibility;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 1rem;
            line-height: var(--base-line-height);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .modal-animate {
            animation: modalPop 0.25s ease-out forwards;
        }

        @keyframes modalPop {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body.lock-scroll {
            position: fixed;
            width: 100%;
        }

        /* 詳細內容樣式 */
        .prose h4 { font-weight: 800; color: #1e293b; margin-top: 1.5rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; font-size: 1.15rem; border-left: 4px solid #3b82f6; padding-left: 0.75rem; }
        .prose p { font-size: 1rem; color: #475569; line-height: 1.75; margin-bottom: 0.9rem; }
        .prose ul, .prose ol { padding-left: 1.25rem; margin-bottom: 1rem; }
        .prose li { font-size: 1rem; color: #475569; margin-bottom: 0.5rem; }
        .prose strong { color: #0f172a; font-weight: 700; }
        .prose code { background-color: #f1f5f9; padding: 8px 10px; border-radius: 10px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; color: #e11d48; font-size: 0.95em; display: block; margin: 0.75rem 0; white-space: pre-wrap; line-height: 1.6; }
        
        .sop-table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.95rem; }
        .sop-table th { background: #f8fafc; text-align: left; padding: 8px; border: 1px solid #e2e8f0; font-weight: 700; }
        .sop-table td { padding: 8px; border: 1px solid #e2e8f0; vertical-align: top; }

        /* 彈窗左側指令內容：由 text-xs 拉回可讀尺寸 */
        #modalContent {
            font-size: 0.95rem;
            line-height: 1.7;
        }

        /* 卡片懸停效果 */
        .tool-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tool-card:hover {
            transform: translateY(-4px);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-40 px-4 py-3 shadow-sm">
        <div class="max-w-6xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-3">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-1.5 rounded-lg shadow-md shadow-blue-100">
                    <i data-lucide="zap" class="text-white w-4 h-4"></i>
                </div>
                <h1 class="text-lg font-black text-slate-800 tracking-tight">AI 實戰指令庫</h1>
            </div>
            
            <div class="relative w-full sm:w-72">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-3.5 h-3.5"></i>
                <input 
                    type="text" 
                    id="searchInput"
                    placeholder="搜尋角色、技巧、Prompt..."
                    class="w-full pl-9 pr-3 py-2.5 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:bg-white transition-all text-sm outline-none"
                >
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6">
        <!-- 分類容器 -->
        <div id="categoryContainer" class="flex flex-wrap gap-1.5 mb-6 overflow-x-auto pb-1 scrollbar-hide"></div>

        <!-- 卡片網格 -->
        <div id="toolGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>

        <!-- 空狀態 -->
        <div id="emptyState" class="hidden text-center py-20 opacity-30">
            <i data-lucide="inbox" class="w-12 h-12 mx-auto mb-3"></i>
            <p class="text-sm">找不到符合內容</p>
        </div>
    </main>

    <!-- 彈窗內容 -->
    <div id="modalOverlay" class="fixed inset-0 z-50 hidden flex items-center justify-center p-3 sm:p-6 overflow-hidden">
        <div class="absolute inset-0 bg-slate-900/70 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="relative bg-white w-full max-w-5xl h-full max-h-[90vh] rounded-2xl shadow-2xl overflow-hidden flex flex-col md:flex-row modal-animate">
            <!-- 左側：指令內容 -->
            <div class="md:w-5/12 p-5 lg:p-8 border-b md:border-b-0 md:border-r border-slate-100 flex flex-col bg-slate-50/50 overflow-hidden">
                <div class="mb-4 flex justify-between items-start">
                    <div>
                        <span class="text-[10px] font-black text-blue-600 bg-blue-100 px-2 py-0.5 rounded uppercase tracking-widest">Prompt Preview</span>
                        <h2 id="modalTitle" class="text-lg lg:text-xl font-bold text-slate-900 mt-1"></h2>
                    </div>
                    <button onclick="closeModal()" class="md:hidden p-1.5 text-slate-400 bg-white rounded-full shadow-sm">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <div id="modalContent" class="flex-1 bg-white border border-slate-200 rounded-xl p-4 overflow-y-auto text-sm font-mono text-slate-700 shadow-inner whitespace-pre-wrap"></div>
                <button id="copyBtn" class="mt-4 w-full py-3.5 rounded-xl font-bold flex items-center justify-center gap-2 bg-slate-900 text-white hover:bg-blue-600 transition-all shadow-md active:scale-95 text-sm">
                    <i data-lucide="copy" class="w-4 h-4"></i>
                    <span>複製指令</span>
                </button>
            </div>
            <!-- 右側：詳細指南 -->
            <div class="md:w-7/12 p-5 lg:p-8 overflow-y-auto bg-white relative">
                <button onclick="closeModal()" class="hidden md:block absolute top-5 right-5 p-2 hover:bg-slate-100 rounded-full text-slate-400 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
                <div class="mb-4">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-1">
                        <i data-lucide="info" class="w-3 h-3"></i> 實戰指引與心法
                    </span>
                </div>
                <div id="modalDetails" class="prose max-w-none"></div>
            </div>
        </div>
    </div>

                content: "撰寫一個更緊湊的新摘要，補充先前摘要中缺少的相關資訊，文章長度要相同，避免冗長語句。",
                tags: ["摘要", "密度鏈", "資訊壓縮"],
                details: `
                    <h4>操作流程：</h4>
                    <p>這是一個迭代過程。1. 先生出普通摘要。2. 識別 2 個漏掉的關鍵名詞。3. 融入名詞並維持原句數。重複 3 次效果最佳。</p>
                `

        let currentCategory = '全部';
        let currentSearch = '';

        function init() {
            renderCategories();
            renderCards();
            lucide.createIcons();
            document.getElementById('searchInput').addEventListener('input', (e) => {
                currentSearch = e.target.value.toLowerCase();
                renderCards();
            });
        }

        function renderCategories() {
            const categories = ['全部', ...new Set(INITIAL_DATA.map(i => i.category))];
            const container = document.getElementById('categoryContainer');
            container.innerHTML = categories.map(cat => `
                <button onclick="filterCategory('${cat}')" class="px-3 py-1.5 rounded-xl text-xs font-bold whitespace-nowrap transition-all border-2 ${cat === currentCategory ? 'bg-slate-900 text-white border-slate-900 shadow-md' : 'bg-white text-slate-500 border-slate-100 hover:bg-slate-100'}">
                    ${cat}
                </button>
            `).join('');
        }

        function filterCategory(cat) {
            currentCategory = cat;
            renderCategories();
            renderCards();
        }

        function renderCards() {
            const grid = document.getElementById('toolGrid');
            const empty = document.getElementById('emptyState');
            const filtered = INITIAL_DATA.filter(item => {
                const matchesSearch = item.title.toLowerCase().includes(currentSearch) || 
                                     item.tags.some(t => t.toLowerCase().includes(currentSearch)) ||
                                     item.description.toLowerCase().includes(currentSearch);
                const matchesCat = currentCategory === '全部' || item.category === currentCategory;
                return matchesSearch && matchesCat;
            });

            if (filtered.length === 0) { grid.innerHTML = ''; empty.classList.remove('hidden'); return; }
            empty.classList.add('hidden');
            grid.innerHTML = filtered.map(item => `
                <div onclick="openModal(${item.id})" class="tool-card bg-white rounded-2xl border border-slate-200 p-5 hover:border-blue-500 hover:shadow-xl hover:shadow-blue-100/30 cursor-pointer flex flex-col group">
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-[10px] font-black uppercase tracking-widest px-2 py-0.5 bg-slate-100 text-slate-500 rounded group-hover:bg-blue-600 group-hover:text-white transition-colors">${item.category}</span>
                        <i data-lucide="external-link" class="w-3 h-3 text-slate-300"></i>
                    </div>
                    <h3 class="text-sm font-bold mb-1.5 text-slate-800 group-hover:text-blue-600 transition-colors">${item.title}</h3>
                    <p class="text-slate-500 text-sm mb-4 line-clamp-2">${item.description}</p>
                    <div class="flex flex-wrap gap-1 mt-auto">
                        ${item.tags.map(t => `<span class="text-[11px] text-blue-600 bg-blue-50 px-2 py-0.5 rounded font-bold">#${t}</span>`).join('')}
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function openModal(id) {
            const item = INITIAL_DATA.find(i => i.id === id);
            if (!item) return;
            document.getElementById('modalTitle').innerText = item.title;
            document.getElementById('modalContent').innerText = item.content;
            document.getElementById('modalDetails').innerHTML = item.details;
            document.getElementById('modalOverlay').classList.remove('hidden');
            document.body.classList.add('lock-scroll');
            const copyBtn = document.getElementById('copyBtn');
            copyBtn.onclick = () => {
                const textArea = document.createElement("textarea");
                textArea.value = item.content;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    copyBtn.innerHTML = `<i data-lucide="check" class="w-4 h-4"></i><span>指令已複製</span>`;
                    copyBtn.classList.replace('bg-slate-900', 'bg-green-600');
                    lucide.createIcons();
                    setTimeout(() => {
                        copyBtn.innerHTML = `<i data-lucide="copy" class="w-4 h-4"></i><span>複製指令</span>`;
                        copyBtn.classList.replace('bg-green-600', 'bg-slate-900');
                        lucide.createIcons();
                    }, 2000);
                } catch (err) { console.error('複製失敗'); }
                document.body.removeChild(textArea);
            };
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.add('hidden');
            document.body.classList.remove('lock-scroll');
        }

        window.onload = init;
    </script>
