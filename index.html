<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 實戰指令庫 - 列表導覽版</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8fafc; /* slate-50 */
            color: #0f172a; /* slate-900 */
        }

        /* 自訂捲動條，讓介面更像應用程式 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* 展開/收合動畫 */
        .accordion-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s ease-in-out;
        }
        .accordion-content.open {
            grid-template-rows: 1fr;
        }
        .accordion-inner {
            overflow: hidden;
        }

        /* 詳細內容排版 */
        .prose h4 { font-weight: 700; color: #1e293b; margin-top: 1rem; margin-bottom: 0.5rem; font-size: 0.95rem; }
        .prose p { font-size: 0.875rem; color: #475569; line-height: 1.6; margin-bottom: 0.75rem; }
        .prose ul, .prose ol { padding-left: 1.25rem; margin-bottom: 0.75rem; font-size: 0.875rem; color: #475569;}
        .prose li { margin-bottom: 0.25rem; }
        .prose code { background-color: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-family: ui-monospace, monospace; color: #e11d48; font-size: 0.85em; }

        /* 代碼區塊樣式 */
        .prompt-box {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            white-space: pre-wrap;
            line-height: 1.6;
        }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row overflow-hidden">

    <!-- 頂部/左側 導覽列 (Sidebar) -->
    <aside class="w-full md:w-64 lg:w-72 bg-white border-b md:border-b-0 md:border-r border-slate-200 flex flex-col flex-shrink-0 z-20 shadow-sm md:shadow-none">

        </div>

        <div id="sidebarContent" class="hidden md:flex flex-col flex-1 overflow-y-auto">
            
            <!-- 搜尋框 -->
            <div class="p-4 pb-2">
                <div class="relative group">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4 group-focus-within:text-blue-500 transition-colors"></i>
                    <input 
                        type="text" 
                        id="searchInput"
                        placeholder="搜尋指令、標籤..."
                        class="w-full pl-9 pr-3 py-2 bg-slate-100 border border-transparent rounded-lg focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all text-sm outline-none"
                    >
                </div>
            </div>

            <!-- 分類選單 -->
            <nav class="flex-1 p-2 space-y-0.5" id="categoryContainer">
                <!-- 透過 JS 生成 -->
            </nav>

            <div class="p-4 border-t border-slate-100 text-xs text-slate-400 font-medium">
                共 <span id="totalCount" class="text-slate-600 font-bold">0</span> 個實戰指令
            </div>
        </div>
    </aside>

    <!-- 右側/主要 內容區 (Main Content) -->
    <main class="flex-1 flex flex-col h-full bg-slate-50 relative">
        
        <!-- 當前分類標題列 -->

            <div id="toolList" class="max-w-4xl mx-auto space-y-4">
                <!-- 卡片透過 JS 生成 -->
            </div>
            
            <!-- 空狀態 -->

                <p class="text-slate-600 font-medium">找不到符合的指令</p>
            </div>
        </div>
    </main>

        let openCardId = null; // 追蹤當前打開的手風琴卡片

        function init() {
            renderSidebar();
            renderList();
            lucide.createIcons();
            document.getElementById('totalCount').innerText = INITIAL_DATA.length;

            // 搜尋事件
            document.getElementById('searchInput').addEventListener('input', (e) => {
                currentSearch = e.target.value.toLowerCase();
                renderList();
            });

            // 手機版選單切換
            document.getElementById('mobileMenuBtn').addEventListener('click', () => {
                const sidebar = document.getElementById('sidebarContent');
                sidebar.classList.toggle('hidden');
                sidebar.classList.toggle('flex');
            });
        }

        // --- 渲染左側分類導覽 ---
        function renderSidebar() {
            // 計算每個分類的數量
            const catCounts = INITIAL_DATA.reduce((acc, item) => {
                acc[item.category] = (acc[item.category] || 0) + 1;
                return acc;
            }, {});

            const categories = ['全部', ...new Set(INITIAL_DATA.map(i => i.category))];
            const container = document.getElementById('categoryContainer');
            
            container.innerHTML = categories.map(cat => {
                const count = cat === '全部' ? INITIAL_DATA.length : catCounts[cat];
                const isActive = cat === currentCategory;
                return `
                    <button onclick="filterCategory('${cat}')" 
                        class="w-full text-left px-3 py-2 rounded-lg text-sm font-medium transition-all flex justify-between items-center group ${
                            isActive 
                            ? 'bg-blue-50 text-blue-700' 
                            : 'text-slate-600 hover:bg-slate-100 hover:text-slate-900'
                        }">
                        <span>${cat}</span>
                        <span class="text-xs ${isActive ? 'bg-blue-100 text-blue-600' : 'bg-slate-100 text-slate-400 group-hover:bg-slate-200'} px-2 py-0.5 rounded-full transition-colors">
                            ${count}
                        </span>
                    </button>
                `;
            }).join('');
        }

        function filterCategory(cat) {
            currentCategory = cat;
            openCardId = null; // 切換分類時關閉所有展開項目
            
            // 手機版點擊分類後自動收合選單
            if (window.innerWidth < 768) {
                const sidebar = document.getElementById('sidebarContent');
                sidebar.classList.add('hidden');
                sidebar.classList.remove('flex');
            }

            renderSidebar();
            renderList();
            
            // 捲動回頂部
            document.getElementById('mainScrollArea').scrollTop = 0;
        }

        // --- 渲染右側列表內容 ---
        function renderList() {
            const list = document.getElementById('toolList');
            const empty = document.getElementById('emptyState');
            
            const filtered = INITIAL_DATA.filter(item => {
                const matchesSearch = item.title.toLowerCase().includes(currentSearch) || 
                                     item.tags.some(t => t.toLowerCase().includes(currentSearch)) ||
                                     item.description.toLowerCase().includes(currentSearch) ||
                                     item.content.toLowerCase().includes(currentSearch);
                const matchesCat = currentCategory === '全部' || item.category === currentCategory;
                return matchesSearch && matchesCat;
            });

            // 更新標題列狀態
            document.getElementById('currentCategoryTitle').innerHTML = `
                ${currentCategory} <span class="text-sm font-normal text-slate-500 bg-slate-100 px-2 py-0.5 rounded-full">${filtered.length}</span>
            `;

            if (filtered.length === 0) { 
                list.innerHTML = ''; 
                empty.classList.remove('hidden'); 
                empty.classList.add('flex');
                return; 
            }
            
            empty.classList.add('hidden');
            empty.classList.remove('flex');

            list.innerHTML = filtered.map(item => {
                const isOpen = openCardId === item.id;
                
                return `
                <div class="tool-card bg-white rounded-xl border ${isOpen ? 'border-blue-300 shadow-md ring-1 ring-blue-50' : 'border-slate-200 hover:border-slate-300'} overflow-hidden">
                    
                    <!-- 卡片標題區 (可點擊展開/收合) -->
                    <div onclick="toggleCard(${item.id})" class="p-4 md:p-5 cursor-pointer flex gap-4 items-start select-none">
                        <div class="mt-1 text-slate-400 transition-transform duration-300 ${isOpen ? 'rotate-90 text-blue-500' : ''}">
                            <i data-lucide="chevron-right" class="w-5 h-5"></i>
                        </div>
                        <div class="flex-1">
                            <div class="flex flex-wrap items-center gap-2 mb-1">
                                <h3 class="text-base font-bold text-slate-800">${item.title}</h3>
                                ${currentCategory === '全部' ? `<span class="text-[10px] font-bold text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded">${item.category}</span>` : ''}
                            </div>
                            <p class="text-slate-500 text-sm mb-3 ${isOpen ? '' : 'line-clamp-1'} transition-all">${item.description}</p>
                            <div class="flex flex-wrap gap-1.5">
                                ${item.tags.map(t => `<span class="text-[10px] text-blue-600 bg-blue-50 px-1.5 py-0.5 rounded border border-blue-100">#${t}</span>`).join('')}
                            </div>
                        </div>
                        <button onclick="event.stopPropagation(); copyText('${item.id}')" class="shrink-0 flex items-center justify-center gap-1.5 px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 hover:text-slate-900 rounded-lg text-xs font-semibold transition-colors" title="複製指令">
                            <i data-lucide="copy" class="w-3.5 h-3.5"></i> <span class="hidden sm:inline">複製</span>
                        </button>
                    </div>

                    <!-- 手風琴展開內容區 -->
                    <div class="accordion-content ${isOpen ? 'open' : ''}">
                        <div class="accordion-inner bg-slate-50 border-t border-slate-100">
                            <div class="p-4 md:p-6 grid md:grid-cols-2 gap-6">
                                
                                <!-- 左側：Prompt 原文 -->
                                <div>
                                    <div class="flex items-center gap-2 mb-3">
                                        <i data-lucide="terminal-square" class="w-4 h-4 text-blue-600"></i>
                                        <h4 class="text-xs font-bold text-slate-500 uppercase tracking-wider">Prompt</h4>
                                    </div>
                                    <div id="prompt-content-${item.id}" class="prompt-box bg-white border border-slate-200 p-4 rounded-lg text-sm text-slate-700 shadow-sm">
${item.content}
                                    </div>
                                    <button onclick="copyText('${item.id}')" class="w-full mt-3 py-2.5 bg-white border border-slate-200 hover:border-blue-400 hover:bg-blue-50 text-slate-700 hover:text-blue-700 font-semibold text-sm rounded-lg flex justify-center items-center gap-2 transition-colors">
                                        <i data-lucide="copy" class="w-4 h-4"></i> 複製指令
                                    </button>
                                </div>

                                <!-- 右側：實戰指引 (Details) -->
                                <div>
                                    <div class="flex items-center gap-2 mb-3">
                                        <i data-lucide="info" class="w-4 h-4 text-amber-500"></i>
                                        <h4 class="text-xs font-bold text-slate-500 uppercase tracking-wider">Guide & Details</h4>
                                    </div>
                                    <div class="prose max-w-none bg-transparent">
                                        ${item.details}
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
            
            lucide.createIcons();
        }

        // --- 互動邏輯 ---
        function toggleCard(id) {
            // 點擊已展開的，則關閉；點擊未展開的，則展開該項並關閉其他
            openCardId = openCardId === id ? null : id;
            renderList();
        }

        function copyText(id) {
            const item = INITIAL_DATA.find(i => i.id == id);
            if (!item) return;

            const textArea = document.createElement("textarea");
            textArea.value = item.content;
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                document.execCommand('copy');
                showToast();
            } catch (err) {
                console.error('複製失敗');
            }
            document.body.removeChild(textArea);
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('translate-y-20', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 2500);
        }

        window.onload = init;
    </script>
</body>
</html>
